/* ===== Layout (exemplo): topo azul + cards brancos + bottom nav ===== */
body{background:#F5F7FF;}
main.container{padding-top:14px;padding-bottom:98px;}

header.app-premium,header{backdrop-filter:none;border-bottom:0;
  background:linear-gradient(180deg,var(--brand-600) 0%, #2F66DF 55%, #2759C8 100%);
  padding:14px 0 18px 0!important;
  border-bottom-left-radius:26px;border-bottom-right-radius:26px;
}
header .header-main{background:transparent;box-shadow:none;border:0;padding:0 12px;}

/* esconde apenas as 3 tabs (navegação fica no rodapé), mas mantém o upload */
header #btnViewCards,header #btnViewSummary{display:none!important;}

/* garante que o grupo de botões continue visível (para o upload funcionar) */
header .btn-group{display:flex!important;}

/* Botão de upload no topo (pílula) */
header label.btn{border-radius:999px;background:rgba(255,255,255,.16)!important;border:1px solid rgba(255,255,255,.28)!important;
  backdrop-filter: blur(6px);
}
header label.btn:hover{background:rgba(255,255,255,.22)!important;}

/* cards */
.filters-card,.chart-card,.kpi-card,.card-forecast,.filled-card{border-radius:18px;border:1px solid rgba(230,232,245,.95);
  box-shadow:0 10px 24px rgba(32,33,66,.08);
}
.form-select.form-select-sm,.form-control.form-control-sm{border-radius:12px;}

h2.h6{font-weight:800;letter-spacing:.2px;}

/* Bottom nav discreta */
.bottom-nav{position:fixed;left:14px;right:14px;bottom:14px;z-index:2500;
  background:rgba(255,255,255,.92);border:1px solid rgba(230,232,245,.95);
  border-radius:22px;box-shadow:0 18px 44px rgba(32,33,66,.14);
  display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:10px;
}
.bottom-nav .nav-item{appearance:none;border:0;background:transparent;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  color:var(--text-700);padding:8px 6px;border-radius:16px;font-weight:700;font-size:.72rem;
}
.bottom-nav .nav-item i{font-size:1.18rem;}
.bottom-nav .nav-item.active{color:var(--brand-700);background:transparent;}
.bottom-nav .nav-item.active::after{content:'';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  width:6px;height:6px;border-radius:999px;background:rgba(106,146,242,.85);
}

.mini-card{border-radius:18px;border:1px solid rgba(230,232,245,.95);background:#fff;box-shadow:0 10px 24px rgba(32,33,66,.08);overflow:hidden;}

.mini-card details.mini-details summary .chev{opacity:.85;}

/* Oculta cartões quando o Resumo estiver visível */
#summarySection:not([hidden]) ~ #cardsSection{ display:none !important; }

<script>(function(){ try{ if(location && location.protocol === 'file:'){ document.getElementById('envWarning')?.classList.remove('d-none'); } }catch(e){} })();

const state = { rows:[], headers:[], filtered:[], forecastInputs:new Map(), stockInputs:new Map(), filled:new Map(), filledMeta:new Map() };

const APP_BASE_URL = (function(){
  const p = location.pathname;

})();

function setSyncStatus(text, danger=false){

function nowBR(){
  try{ return dayjs().format('DD/MM HH:mm'); }catch(e){
    const d=new Date();
    return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');

// --- Overrides locais (somente no celular do gerente) ---
const LS_KEYS = {
  fcst: 'forecastApp_overrides_fcst_v1',
  stk:  'forecastApp_overrides_stk_v1',
  meta: 'forecastApp_overrides_meta_v1'
};

function stableRowKey(r){
  const emp = String(r?.[MAP.empresa] ?? '').trim();
  const clif = String(r?.[MAP.clifor] ?? '').trim();
  const cli  = String(r?.[MAP.cliente] ?? '').trim();
  const cat  = String(r?.[MAP.categoria] ?? '').trim();
  return [emp, clif, cli, cat].join('|').toUpperCase();
}

function loadOverrides(){
  const safeParse = (k)=>{ try{ return JSON.parse(localStorage.getItem(k)||'{}'); }catch(e){ return {}; } };
  return {
    fcst: safeParse(LS_KEYS.fcst),
    stk: safeParse(LS_KEYS.stk),
    meta: safeParse(LS_KEYS.meta)
  };
}

function saveOverrideObj(storageKey, obj){
  try{ localStorage.setItem(storageKey, JSON.stringify(obj||{})); }catch(e){}
}

function applyOverridesToState(){
  const ov = loadOverrides();
  (state.rows||[]).forEach(r=>{
    const sk = stableRowKey(r);
    const idx = String(r.__rowIndex__ ?? '');
    if(ov.fcst && ov.fcst[sk] != null){
      const n = Number(ov.fcst[sk]);
      if(Number.isFinite(n)) state.forecastInputs.set(idx, n);
      state.filled.set(idx, r);
    }
    if(ov.stk && ov.stk[sk] != null){
      const n2 = Number(ov.stk[sk]);
      if(Number.isFinite(n2)) state.stockInputs.set(idx, n2);
      state.filled.set(idx, r);
    }
    if(ov.meta && ov.meta[sk]){
      state.filledMeta.set(idx, ov.meta[sk]);
    }
  });
}


async function fetchBaseXlsx(){
  const candidates = [
    APP_BASE_URL + 'base.xlsx',
    APP_BASE_URL + 'data/base.xlsx'
  ];
  let lastErr = null;
  for(const baseUrl of candidates){
    const url = baseUrl + '?v=' + Date.now();
    try{
      if(typeof XLSX==='undefined'){ throw new Error('Biblioteca XLSX não carregou.'); }
      const resp = await fetch(url);
      if(resp.ok) return await resp.arrayBuffer();
      lastErr = new Error('Falha ao baixar base.xlsx ('+resp.status+') em ' + baseUrl);
    }catch(e){
      lastErr = e;
    }
  }
  throw lastErr || new Error('Não foi possível baixar a base.');
}

async function loadBaseFromServer(options={silent:false}){
  const silent = !!options.silent;
  const badge=document.getElementById('loadBadge');
  if(!silent && badge){ badge.classList.remove('d-none'); badge.textContent='Atualizando base (GitHub)...'; }
  setSyncStatus('Atualizando base...', false);

  if(typeof XLSX==='undefined'){ throw new Error('Biblioteca XLSX não carregou.'); }
  const buf = await fetchBaseXlsx();
  const wb = XLSX.read(buf, {type:'array'});
  if(!wb.SheetNames || !wb.SheetNames.length){ throw new Error('Planilha sem abas.'); }

  const ws = wb.Sheets[wb.SheetNames[0]];
  const headerRows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  const hdrIdx = detectHeaderRow(headerRows);
  const headers = (headerRows[hdrIdx] || []).map(v=> String(v||'').trim().toUpperCase());

  const ref = ws['!ref'] || 'A1:Z9999';
  const range = XLSX.utils.decode_range(ref);
  range.s.r = hdrIdx;
  const newRef = XLSX.utils.encode_range(range);
  const wsCloned = Object.assign({}, ws, {'!ref': newRef});

  const rowsRaw = XLSX.utils.sheet_to_json(wsCloned, {defval:'', raw:true});
  const rows = rowsRaw.map((r,i)=>{
    const o={};
    for(const k in r){ o[String(k||'').trim().toUpperCase()] = r[k]; }
    o.__rowIndex__=i;
    return o;
  });

  state.rows = rows; state.headers = headers; ensureSearchIndex();

  hydrateFromWorkbookRows();
  applyOverridesToState();

  applyFilters();
  document.getElementById('filtersTop').hidden=false;
  buildTopFilters();
  document.getElementById('activeFilters').hidden=false;
  document.getElementById('cardsSection').hidden=true;
  document.getElementById('tipBox')?.classList.add('d-none');

  if(badge && !silent){
    badge.classList.remove('d-none');
    badge.textContent = `Base carregada: ${rows.length} linhas — última atualização ${nowBR()}`;
  }

  setSyncStatus('Base atualizada ' + nowBR(), false);
  showSection('summary');
}

function setupAutoRefresh(){
  loadBaseFromServer().catch(err=>{
    console.error(err);
    setSyncStatus('Falha ao atualizar (toque em Atualizar)', true);
  });

  document.getElementById('btnSync')?.addEventListener('click', ()=>{
    loadBaseFromServer().catch(err=>{
      console.error(err);
      alert('Falha ao atualizar a base: ' + (err?.message||err));
      setSyncStatus('Falha ao atualizar (toque em Atualizar)', true);
    });
  });

  setInterval(()=>{
    loadBaseFromServer({silent:true}).catch(err=>{
      console.error(err);
      setSyncStatus('Falha auto-refresh ' + nowBR(), true);
    });
  }, AUTO_REFRESH_MS);

  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState === 'visible'){
      loadBaseFromServer({silent:true}).catch(()=>{});
    }
  });
}

// ===== Forecast semanal dinâmico (FORECAST 02, FORECAST 09, ...) =====
function getForecastWeekCols(){
  const hdrs = (state.headers||[]).map(h=>String(h||'').trim().toUpperCase());
  const cols = hdrs.filter(h=>/^FORECAST\s+\d+$/i.test(h));
  cols.sort((a,b)=>{
    const na = parseInt(String(a).match(/\d+/)?.[0]||'0',10);
    const nb = parseInt(String(b).match(/\d+/)?.[0]||'0',10);
    return na-nb;
  });
  return cols;
}
function fcstLabel(colName){
  return String(colName||'').toUpperCase().replace(/^FORECAST\s+/, 'FCST ');
}

function latestForecastFromRow(row){
  const cols = getForecastWeekCols();
  if(!cols.length) return 0;
  const last = cols[cols.length-1];
  const n = Number(row?.[last]);
  return Number.isFinite(n) ? n : 0;
}

function buildForecastHistoryHtml(row){
  const parts = [];
  const cols = getForecastWeekCols();
  cols.forEach(c=>{
    const v = row?.[c];
    if(v===undefined || v===null || String(v).trim()==='') return;
    parts.push(`<div class="mini-kv"><span>${fcstLabel(c)}</span><b>${fmt(v)}</b></div>`);
  });
  return parts.length ? parts.join('') : `<div class="small-muted">Sem histórico de forecasts na base.</div>`;
}

function debounce(fn, delay){
  let t;

function uniqueValues(rows,col){ const S=new Set(); rows.forEach(r=>S.add(String(r[col]??''))); S.delete(''); return Array.from(S).sort((a,b)=> a.localeCompare(b,'pt-BR')); }

function fmt(n){ if(n===null||n===undefined||n==='') return '—'; const num=Number(n); return Number.isFinite(num)? num.toLocaleString('pt-BR') : String(n); }
function fmt0(n){ if(n===null||n===undefined||n==='') return '—'; const num=Number(n); return Number.isFinite(num)? num.toLocaleString('pt-BR',{maximumFractionDigits:0}) : String(n); }
function fmtPct(n){ if(n===null||n===undefined||!Number.isFinite(n)) return '—'; return (n*100).toLocaleString('pt-BR',{maximumFractionDigits:1})+'%'; }

function getThemeVar(varName, fallback='#000'){

function aggregateBy(groupCol, rows){
  const grp = new Map();
  (rows||[]).forEach(r=>{
    const key = String(r[groupCol]??'—');
    const idx = String(r.__rowIndex__ ?? '');
    const atual = numValBR(state.forecastInputs.get(idx)) || numValBR(r[MAP.forecast_prev]);
    const meta = numValBR(r[MAP.meta]);
    const rc = numValBR(r[MAP.rc]);
    if(!grp.has(key)){ grp.set(key, {name:key, atual:0, meta:0, rc:0, ating:0, count:0}); }
    const o = grp.get(key);
    o.atual += atual;
    o.meta += meta;
    o.rc += rc;
    o.count += 1;
  });
  const arr = Array.from(grp.values());
  arr.forEach(r=>{ r.ating = r.meta > 0 ? r.atual / r.meta : 0; });
  return arr;
}

function sortAgg(arr, sortBy){
  const a = arr.slice();
  if(sortBy==='ating'){ a.sort((x,y)=>y.ating-x.ating); }
  else if(sortBy==='atual'){ a.sort((x,y)=>y.atual-x.atual); }
  else if(sortBy==='meta'){ a.sort((x,y)=>y.meta-x.meta); }
  return a;
}

function _colorsForLabels(labels, palette, alpha){
  return labels.map((l,i)=> {
    const c = palette[i % palette.length];
    if(c.startsWith('#')){
      const r=parseInt(c.slice(1,3),16), g=parseInt(c.slice(3,5),16), b=parseInt(c.slice(5,7),16);
      return `rgba(${r},${g},${b},${alpha})`;
    }
    return c;
  });
}

function detectHeaderRow(headerRows){
  for(let i=0; i<Math.min(5, headerRows.length); i++){
    const row = headerRows[i] || [];
    const nonEmpty = row.filter(v=> String(v||'').trim()).length;
    if(nonEmpty > 5) return i;
  }
  return 0;
}

function applyFilters(){
  const rows = state.rows || [];
  const empresa = $('#flt_empresa')?.value || '';
  const gerente = $('#flt_gerente')?.value || '';
  const coord = $('#flt_coordenador')?.value || '';
  const vendedor = $('#flt_vendedor')?.value || '';
  const uf = $('#flt_uf')?.value || '';
  const categoria = $('#flt_categoria')?.value || '';
  const clifor = ($('#flt_clifor')?.value || '').trim().toUpperCase();
  const cliente = ($('#flt_cliente')?.value || '').trim().toLowerCase();

  state.filtered = rows.filter(r=>{
    if(empresa && String(r[MAP.empresa]||'') !== empresa) return false;
    if(gerente && String(r[MAP.gerente]||'') !== gerente) return false;
    if(coord && String(r[MAP.coordenador]||'') !== coord) return false;
    if(vendedor && String(r[MAP.vendedor]||'') !== vendedor) return false;
    if(uf && String(r[MAP.uf]||'') !== uf) return false;
    if(categoria && String(r[MAP.categoria]||'') !== categoria) return false;
    if(clifor && !String(r[MAP.clifor]||'').toUpperCase().includes(clifor)) return false;
    if(cliente && !String(r[MAP.cliente]||'').toLowerCase().includes(cliente)) return false;
    return true;
  });
}

        <summary><span>Forecasts anteriores</span><i class="bi bi-chevron-down chev"></i></summary>
        <div class="details-body">${buildForecastHistoryHtml(r)}</div>
      </details>
    `;
    container.appendChild(card);
  });

  document.querySelectorAll('.forecast-input').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      const idx = inp.dataset.idx;
      const v = Number(inp.value);
      if(Number.isFinite(v)){
        state.forecastInputs.set(idx, v);
        const r = state.rows[idx];
        if(r) state.filled.set(idx, r);
        const ov = loadOverrides();
        const sk = stableRowKey(r);
        ov.fcst[sk] = v;
        saveOverrideObj(LS_KEYS.fcst, ov.fcst);
      }
    });
  });

  document.querySelectorAll('.stock-input').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      const idx = inp.dataset.idx;
      const v = Number(inp.value);
      if(Number.isFinite(v)){
        state.stockInputs.set(idx, v);
        const r = state.rows[idx];
        if(r) state.filled.set(idx, r);
        const ov = loadOverrides();
        const sk = stableRowKey(r);
        ov.stk[sk] = v;
        saveOverrideObj(LS_KEYS.stk, ov.stk);
      }
    });
  });
}

function getFilledRows(){
  return Array.from(state.filled.values()).map(r=>{
    const idx = String(r.__rowIndex__ ?? '');
    const atual = state.forecastInputs.get(idx) ?? latestForecastFromRow(r);
    const prev = numValBR(r[MAP.forecast_prev]);
    const meta = numValBR(r[MAP.meta]);
    const rc = numValBR(r[MAP.rc]);
    const updatedAt = '';
    return {row:r, atual, prev, meta, rc, updatedAt};
  });
}

function buildSummaryPivotFilters(rows){
  const empresas = uniqueValues(rows, MAP.empresa);
  const gerentes = uniqueValues(rows, MAP.gerente);
  const categorias = uniqueValues(rows, MAP.categoria);

  ['sum_empresa','sum_gerente','sum_categoria'].forEach((id,i)=>{
    const sel = document.getElementById(id);
    if(!sel) return;
    const vals = i===0? empresas : (i===1? gerentes : categorias);
    sel.innerHTML = '<option value="">— Todos —</option>' + vals.map(v=>`<option value="${v}">${v}</option>`).join('');
  });

  document.getElementById('sum_empresa')?.addEventListener('change', ()=>{ renderSummary(); });
  document.getElementById('sum_gerente')?.addEventListener('change', ()=>{ renderSummary(); });
  document.getElementById('sum_categoria')?.addEventListener('change', ()=>{ renderSummary(); });
  document.getElementById('sum_clear')?.addEventListener('click', ()=>{
    document.getElementById('sum_empresa').value = '';
    document.getElementById('sum_gerente').value = '';
    document.getElementById('sum_categoria').value = '';
    renderSummary();
  });
}

function applySummaryPivotFilters(rows){
  const empresa = document.getElementById('sum_empresa')?.value || '';
  const gerente = document.getElementById('sum_gerente')?.value || '';
  const categoria = document.getElementById('sum_categoria')?.value || '';
  return rows.filter(r=>{
    if(empresa && String(r[MAP.empresa]||'') !== empresa) return false;
    if(gerente && String(r[MAP.gerente]||'') !== gerente) return false;
    if(categoria && String(r[MAP.categoria]||'') !== categoria) return false;
    return true;
  });
}

function renderSummaryTablesOnly(){
  const sec=document.getElementById('summarySection');
  if(!sec || sec.hidden) return;
  const filledRows = state.rows.slice();
  buildSummaryPivotFilters(filledRows);
  const filteredFilled = applySummaryPivotFilters(filledRows);
  renderPivotTables(filteredFilled);
  renderGerenteFcstMetaChart(filteredFilled);
}

function renderPivotTables(rows){
  const zone=document.getElementById('pivotZone');
  if(!zone) return;
  zone.innerHTML='';
  if(!(rows||[]).length){ zone.innerHTML='<div class="alert alert-secondary">Nenhum cartão preenchido para esses filtros.</div>'; return; }
  zone.appendChild(buildPivotCard(rows, MAP.categoria, 'Resumo por Categoria'));
  zone.appendChild(buildPivotCard(rows, MAP.coordenador, 'Resumo por Coordenação'));
}

function buildPivotCard(rows, rowKey, title){
  const weekCols = getForecastWeekCols();
  const grp=new Map();
  (rows||[]).forEach(r=>{
    const key=String(r[rowKey]??'—');
    const idx=String(r.__rowIndex__ ?? '');
    const atual=numValBR(state.forecastInputs.get(idx));
    const fev2025=numValBR(r[MAP.fev2025]);
    const m6=numValBR(r[MAP.media6m]);
    const m3=numValBR(r[MAP.media3m]);
    const meta=numValBR(r[MAP.meta]);
    const rc=numValBR(r[MAP.rc]);
    const prev=numValBR(r[MAP.forecast_prev]);
    const weekVals = {}; weekCols.forEach(c=>{ weekVals[c]=numValBR(r[c]); });
    if(!grp.has(key)){ const base={fev2025:0,m6:0,m3:0,meta:0,rc:0,prev:0,atual:0}; weekCols.forEach(c=> base[c]=0); grp.set(key, base); }
    const o=grp.get(key);
    o.fev2025+=fev2025; o.m6+=m6; o.m3+=m3; o.meta+=meta; o.rc+=rc; o.prev+=prev; weekCols.forEach(c=>{ o[c]+=(weekVals[c]||0); }); o.atual+=atual;
  });
  const arr=Array.from(grp, ([name,v])=>({name,...v})).sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));
  const tot=arr.reduce((acc,r)=>{acc.fev2025+=r.fev2025; acc.m6+=r.m6; acc.m3+=r.m3; acc.meta+=r.meta; acc.rc+=r.rc; acc.prev+=r.prev; weekCols.forEach(c=>{ acc[c]+=(r[c]||0); }); acc.atual+=r.atual; return acc;}, (()=>{ const t={fev2025:0,m6:0,m3:0,meta:0,rc:0,prev:0,atual:0}; weekCols.forEach(c=>t[c]=0); return t; })());
  const calc=(r)=>({fcstVsMeta:r.meta>0? r.atual/r.meta:NaN, fcstMinusMeta:r.atual-r.meta, rcVsFcst:r.atual>0? r.rc/r.atual:NaN, rcMinusMeta:r.rc-r.meta});
  const baseCols=[{k:'fev2025',t:'FEVEREIRO 2025'},{k:'m6',t:'MÉDIA 6M'},{k:'m3',t:'MÉDIA 3M'},{k:'meta',t:'META/02'},{k:'rc',t:'R+C'}];
  const weekHead = weekCols.map(c=>({k:c,t:fcstLabel(c)}));
  const tailCols=[{k:'fcstVsMeta',t:'FCST vs META'},{k:'fcstMinusMeta',t:'FCST - META'},{k:'rcVsFcst',t:'R+C vs FCST'},{k:'rcMinusMeta',t:'R+C - META'}];
  const headCols = [...baseCols, ...weekHead, ...tailCols];
  const card=document.createElement('div');
  card.className='pivot-card';
  card.innerHTML=''
    +'<div class="pivot-head"><div><p class="pivot-title">'+title+'</p><p class="pivot-sub">somente cartões preenchidos</p></div></div>'
    +'<div class="pivot-body"><div class="pivot-scroll">'
    +'<table class="pivot"><thead><tr><th>'+(rowKey===MAP.categoria? 'Categoria' : (rowKey===MAP.coordenador? 'Coordenação' : 'Rótulos de Linha'))+'</th>'
    + headCols.map(c=>'<th class="pv-num">'+c.t+'</th>').join('')
    +'</tr></thead><tbody></tbody><tfoot></tfoot></table>'
    +'</div></div>';
  const tbody=card.querySelector('tbody');
  arr.forEach(r=>{
    if(title==='Resumo por Coordenação' && (String(r.name||'').trim()==='' || String(r.name||'')==='—')){
      const keys = Object.keys(r).filter(k=>k!=='name');
      const sum = keys.reduce((acc,k)=> acc + (Number(r[k])||0), 0);
      if(!sum) return;
    }

    const c=calc(r); const vals={...r,...c};
    const tr=document.createElement('tr');
    const th=document.createElement('th'); th.textContent=r.name; tr.appendChild(th);
    headCols.forEach(col=>{
      const td=document.createElement('td');
      td.className=(col.k==='fcstVsMeta'||col.k==='rcVsFcst')?'pv-pct':'pv-num';
      if(col.k==='fcstVsMeta'||col.k==='rcVsFcst'){
        td.textContent=fmtPct(vals[col.k]);
        if(Number.isFinite(vals[col.k])){ if(vals[col.k]>=1) td.classList.add('pv-pos'); else if(vals[col.k]>=0.8) td.classList.add('pv-warn'); else td.classList.add('pv-neg'); }
      } else if(col.k==='fcstMinusMeta'||col.k==='rcMinusMeta'){
        const v=Number(vals[col.k])||0; td.textContent=fmt0(v); if(v<0) td.classList.add('pv-neg'); else if(v>0) td.classList.add('pv-pos');
      } else {
        td.textContent=fmt0(vals[col.k]);
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  const tfoot=card.querySelector('tfoot');
  const trt=document.createElement('tr');
  const tht=document.createElement('th'); tht.textContent='Total Geral'; trt.appendChild(tht);
  const ct=calc(tot); const valsT={...tot,...ct};
  headCols.forEach(col=>{ const td=document.createElement('td'); td.className=(col.k==='fcstVsMeta'||col.k==='rcVsFcst')?'pv-pct':'pv-num'; if(col.k==='fcstVsMeta'||col.k==='rcVsFcst') td.textContent=fmtPct(valsT[col.k]); else td.textContent=fmt0(valsT[col.k]); trt.appendChild(td); });
  tfoot.appendChild(trt);
  return card;
}

function renderGerenteFcstMetaChart(rows){
  const zone = document.getElementById('gerenteFcstMetaZone');
  if(!zone) return;
  zone.innerHTML = '';

  const gerentes = aggregateBy(MAP.gerente, rows);
  if(!gerentes.length){
    zone.innerHTML = '<div class="alert alert-secondary">Sem dados de gerentes para este gráfico.</div>';
    return;
  }

  gerentes.sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));

  const card = document.createElement('div');
  card.id = 'gerenteFcstMetaCard';
  card.innerHTML = ''
    + '<div class="chart-head">'
    + '<div><p class="chart-title">FCST vs Meta por Gerente</p><p class="chart-sub">diferença entre forecast e meta</p></div>'
    + '</div>'
    + '<div class="chart-body">'
    + '<div class="canvas-wrap"><canvas id="chartGerenteFcstMeta"></canvas></div>'
    + '</div>';

  zone.appendChild(card);

  const labels = gerentes.map(g=>g.name);
  const fcstData = gerentes.map(g=>g.atual);
  const metaData = gerentes.map(g=>g.meta);

  const palette = [
    getThemeVar('--brand-600','#6A92F2'),
    getThemeVar('--ok','#20C997'),
    getThemeVar('--warn','#F59F00')
  ];

  const datasets = [
    {
      label:'FCST (última semana)',
      data:fcstData,
      backgroundColor:_colorsForLabels(labels, [palette[0]], .88)[0],
      borderColor:palette[0],
      borderWidth:1,
      borderRadius:6
    },
    {
      label:'Meta',
      data:metaData,
      backgroundColor:_colorsForLabels(labels, [palette[1]], .88)[0],
      borderColor:palette[1],
      borderWidth:1,
      borderRadius:6
    }
  ];

  const canvas = document.getElementById('chartGerenteFcstMeta');
  if(canvas){
    buildBarV(canvas, labels, datasets);
  }
}

function renderSummary(){
  renderSummaryTablesOnly();
}

// ===== Eventos de filtros expansíveis =====
document.addEventListener('DOMContentLoaded', ()=>{
  // Cartões - Filtros
  const cardsToggle = document.getElementById('cardsFiltersToggle');
  const cardsBody = document.getElementById('cardsFiltersBody');
  if(cardsToggle && cardsBody){
    cardsToggle.addEventListener('click', ()=>{
      cardsBody.classList.toggle('show');
      const icon = cardsToggle.querySelector('i');
      if(icon){
        icon.classList.toggle('bi-chevron-down');
        icon.classList.toggle('bi-chevron-up');
      }
    });
  }

  // Resumo - Filtros
  const summaryToggle = document.getElementById('summaryFiltersToggle');
  const summaryBody = document.getElementById('summaryFiltersBody');
  if(summaryToggle && summaryBody){
    summaryToggle.addEventListener('click', ()=>{
      summaryBody.classList.toggle('show');
      const icon = summaryToggle.querySelector('i');
      if(icon){
        icon.classList.toggle('bi-chevron-down');
        icon.classList.toggle('bi-chevron-up');
      }
    });
  }

  // Bottom nav
  const navItems = document.querySelectorAll('.bottom-nav .nav-item');
  navItems.forEach(item=>{
    item.addEventListener('click', ()=>{
      navItems.forEach(i=>i.classList.remove('active'));
      item.classList.add('active');
      const section = item.dataset.section;
      if(section==='cards') showSection('cards');
      else if(section==='summary') showSection('summary');
    });
  });

  // Upload
  document.getElementById('fileInput')?.addEventListener('change', async (e)=>{
    const file = e.target.files?.[0];
    if(!file) return;
    try{
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const headerRows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      const hdrIdx = detectHeaderRow(headerRows);
      const headers = (headerRows[hdrIdx] || []).map(v=> String(v||'').trim().toUpperCase());
      const ref = ws['!ref'] || 'A1:Z9999';
      const range = XLSX.utils.decode_range(ref);
      range.s.r = hdrIdx;
      const newRef = XLSX.utils.encode_range(range);
      const wsCloned = Object.assign({}, ws, {'!ref': newRef});
      const rowsRaw = XLSX.utils.sheet_to_json(wsCloned, {defval:'', raw:true});
      const rows = rowsRaw.map((r,i)=>{
        const o={};
        for(const k in r){ o[String(k||'').trim().toUpperCase()] = r[k]; }
        o.__rowIndex__=i;
        return o;
      });
      state.rows = rows; state.headers = headers; ensureSearchIndex();
      hydrateFromWorkbookRows();
      applyOverridesToState();
      applyFilters();
      document.getElementById('filtersTop').hidden=false;
      buildTopFilters();
      document.getElementById('activeFilters').hidden=false;
      document.getElementById('cardsSection').hidden=true;
      setSyncStatus('Base carregada localmente', false);
      showSection('summary');
    }catch(err){
      alert('Erro ao carregar arquivo: ' + err.message);
    }
  });

  // Export
  document.getElementById('btnExport')?.addEventListener('click', ()=>{
    const filled = getFilledRows();
    if(!filled.length){ alert('Nenhum cartão preenchido.'); return; }
    const data = filled.map(x=>{
      const r = x.row;
      return {
        'CATEGORIA': r[MAP.categoria]??'—',
        'CLIENTE': r[MAP.cliente]??'—',
        'CLIFOR': r[MAP.clifor]??'—',
        'VENDEDOR': r[MAP.vendedor]??'—',
        'COORDENAÇÃO': r[MAP.coordenador]??'—',
        'GERENTE': r[MAP.gerente]??'—',
        'UF': r[MAP.uf]??'—',
        'EMPRESA': r[MAP.empresa]??'—',
        'Forecast (última semana)': x.atual,
        'Atualizado Em': x.updatedAt
      };
    });
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Forecast');
    XLSX.writeFile(wb, 'forecast_' + new Date().toISOString().slice(0,10) + '.xlsx');
  });

  setupAutoRefresh();
});
</script></body></html>
